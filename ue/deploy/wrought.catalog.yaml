# STAGED — the wrought dedicated-server pod's rail. This is NOT yet in the live LAN
# catalog, on purpose: there is no cooked image to run, and a pod that ImagePullBackOffs
# is a hollow band-aid, not a service. Deploy is gated on two things (see ue/README.md):
#   1. a build box with the engine cooks WroughtServer for Linux, and
#   2. that archive is wrapped into <registry>/wrought-server:latest in Harbor.
#
# The instant that image exists, append the entry below to <private-infra-repo>
# service-catalog/catalog.yaml (via the /gitea skill) and `the deploy tool`. It
# stands up as a UDP game-server pod on node-b — a sibling to the hearth web home,
# reachable at <service-host> (and public via <public-host>, like other game servers).
#
# Resource sizes below are a first guess for a minimal, art-free wrought level; right-size
# them against real pod usage once it's running rather than reserving heavy "to be safe".

  - name: wrought
    description: "wrought — Unreal dedicated fabrication-sim server"
    image: <registry>/wrought-server:latest
    port: 7777
    template: game-server-udp
    tags: ["game", "wrought", "unreal", "dedicated-server"]

    nodeClass: heavy
    wave: 25
    resources: heavy
    storageSize: "10Gi"

    nodeSelector:
      kubernetes.io/hostname: <node>

    resourceOverrides:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
